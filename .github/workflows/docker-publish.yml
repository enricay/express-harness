name: Docker Build and Push

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/express-harness

jobs:

  build-image:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract commit tag
        id: tag
        run: |
          TAG=${GITHUB_SHA::7}
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64


  update-helm:
    runs-on: ubuntu-latest
    needs: build-image
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout Helm repo
        uses: actions/checkout@v4
        with:
          repository: enricay/helm-express-harness
          token: ${{ secrets.GH_TOKEN }}
          path: helm-chart

      - name: Update Helm image tag
        run: |
          TAG=${{ needs.build-image.outputs.image_tag }}
          sed -i "s/tag:.*/tag: $TAG/" helm-chart/values.yaml

      - name: Commit and push changes
        run: |
          cd helm-chart
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add values.yaml
          git commit -m "Update image tag to $TAG" || echo "No changes"
          git push